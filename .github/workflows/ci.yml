# .github/workflows/ci.yml
name: "CI Pipeline"
on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_URL: "postgres://postgres:password@localhost:5432/bridgecare_test"
      # Dummy key for CI asset compilation
      SECRET_KEY_BASE: 1234567890abcdef1234567890abcdef

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ruby and gems
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Install Node.js and dependencies
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'

      - name: Install Yarn dependencies
        run: yarn install --frozen-lockfile

      - name: Setup Database
        run: bin/rails db:prepare

      - name: Precompile Assets (Verifies Vite/Inertia config)
        run: bin/rake vite:build

      # We will add 'bundle exec rspec' here once we write the tests
      - name: Run Tests
        run: echo "Infrastructure Verified. Ready for Specs."