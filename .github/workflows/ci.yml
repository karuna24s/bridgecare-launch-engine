name: "CI Pipeline"

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  # 1. Static Analysis: The "Security & Style" Gate
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run RuboCop (Style & Lint)
        run: bundle exec rubocop

      - name: Run Brakeman (Security Scan)
        # Enforces a Zero-Warning policy by allowing exit codes to propagate
        run: bundle exec brakeman --no-pager

  # 2. Functional Testing: The "Full Suite" Gate
  test:
    needs: scan # Only run expensive tests if the code is safe and clean
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: password
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_URL: "postgres://postgres:password@localhost:5432/bridgecare_test"
      SECRET_KEY_BASE: 1234567890abcdef1234567890abcdef

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ruby and gems
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'

      - name: Install JS dependencies
        run: yarn install --frozen-lockfile

      - name: Setup Database
        # Sequence: Create DB -> Run Migrations -> Load Schema into Test env
        run: |
          bin/rails db:create
          bin/rails db:migrate
          bin/rails db:test:prepare

      - name: Verify Vite Build
        run: bundle exec vite build

      - name: Run All Tests
        # Corrected: test:all ensures unit, integration, and system tests run
        run: bin/rails test:all

