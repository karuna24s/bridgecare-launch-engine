name: "CI Pipeline"

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  # 1. Security & Linting: The "Guardians"
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run RuboCop (Style & Lint)
        run: bundle exec rubocop

      - name: Run Brakeman (Security Scan)
        run: bundle exec brakeman --no-exit-on-warn

  # 2. Functional Testing: The "Truth"
  test:
    needs: scan # Only run tests if security/linting passes
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_URL: "postgres://postgres:password@localhost:5432/bridgecare_test"
      SECRET_KEY_BASE: 1234567890abcdef1234567890abcdef

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ruby and gems
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'

      - name: Install JS dependencies
        run: yarn install --frozen-lockfile

      - name: Setup Database
       # Senior Move: Migrate first to generate schema.rb, then prepare test env
        run: |
          bin/rails db:migrate
          bin/rails db:test:prepare

      - name: Verify Vite Build
        run: bundle exec vite build

      - name: Run Tests (Minitest)
        # No longer a no-op! This executes the actual test suite.
        run: bin/rails test test:system

